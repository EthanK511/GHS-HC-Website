<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GHS Hack Club - Join</title>
    <meta name="description" content="Contact the template website team." />
    <link rel="stylesheet" href="https://css.hackclub.com/theme.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="Go to home">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-name">GHS Hack Club</span>
        </a>

        <nav class="nav" aria-label="Primary">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="about.html">About</a>
          <a class="nav-link is-active" href="join.html">Join</a>
        </nav>
      </div>
    </header>

    <main id="main">
      <section class="page-header">
        <div class="container">
          <h1>Join</h1>
          <p class="lead">Want to join the club? Fill out the form below and we’ll reach out.</p>
        </div>
      </section>

      <section class="section">
        <div class="container join-wrap">
          <div class="join-card">
            <div class="join-card-header">
              <h2>How to join</h2>
            </div>

            <div class="form-embed">
              <iframe
                title="Join GHS Hack Club form"
                src="https://docs.google.com/forms/d/e/1FAIpQLSf2sIXoBVUo-orRqk5RUgzI9UWvpehwM73hXPHtViHt2y_dbA/viewform?embedded=true"
                loading="lazy"
                referrerpolicy="no-referrer"
              >
                Loading…
              </iframe>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="muted">© <span id="year">2026</span> GHS Hack Club. All rights reserved.</p>
        <div class="footer-links">
          <a href="about.html">About</a>
          <a href="join.html">Join</a>
        </div>
      </div>
      <script>
        document.getElementById("year").textContent = new Date().getFullYear();
      </script>
    </footer>
  </body>
</html>
